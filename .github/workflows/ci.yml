name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  app-checks:
    name: App Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hvac-design-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint --quiet

      - name: Build app
        run: pnpm build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_DEBUG_MODE: false

      - name: Run stable targeted tests
        run: >
          pnpm exec vitest run
          src/core/services/__tests__/connectionDetection.test.ts
          src/features/canvas/clipboard/__tests__/entityClipboard.test.ts
          src/features/canvas/__tests__/CanvasPageWrapper.hydration.web.test.ts
