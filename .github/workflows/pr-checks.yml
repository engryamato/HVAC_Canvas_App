name: PR Hygiene

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

jobs:
  hygiene:
    name: PR Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed files for debug statements
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1

          if git diff "origin/${{ github.base_ref }}..HEAD" -- '*.ts' '*.tsx' | grep -E '^\+.*console\.(log|debug|info)'; then
            echo "::warning::Found console debug statements in changed files."
          else
            echo "No console debug statements found."
          fi

      - name: Check changed files for TODOs
        shell: bash
        run: |
          set -euo pipefail

          if git diff "origin/${{ github.base_ref }}..HEAD" | grep -E '^\+.*//\s*TODO'; then
            echo "::warning::Found new TODO comments in changed files."
          else
            echo "No new TODO comments found."
          fi
